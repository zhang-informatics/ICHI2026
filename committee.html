<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organizing Committee | ICHI 2026</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="committee.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Top Navigation -->
<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">
      <img src="assets/images/ieee-logo_v2.png" alt="IEEE ICHI 2026 Logo" />
    </a>
    <div id="top-nav"></div>
  </div>
</header>

<!-- Header Section -->
<section class="hero" style="background-image: url('assets/images/committee-bg.jpeg');">
  <div class="hero-text">
    <h1>Organizing Committee</h1>
  </div>
</section>

<!-- Committee Grid Section -->
<main>
  <div id="committee-container"></div>
</main>

<!-- Back to Top -->
<button onclick="scrollToTop()" id="backToTop" title="Back to Top">↑</button>

<!-- Footer -->
<div id="footer"></div>
<script>
  fetch('nav.html')
          .then(res => res.text())
          .then(html => { document.getElementById('top-nav').innerHTML = html; });

  fetch('footer.html')
          .then(res => res.text())
          .then(html => { document.getElementById('footer').innerHTML = html; });
</script>

<!-- Committee Rendering -->
<script src="committee.js"></script>
</body>
</html>
